<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recipe App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'recipe_list' %}">🍽️ Smart Recipes</a>
        <div class="d-flex text-white align-items-center">
            {% if user.is_authenticated %}
                <span class="me-3">Hello, {{ user.username }}</span>
                <a href="{% url 'recipe_create' %}" class="btn btn-sm btn-success me-2">+ New Recipe</a>
                <a href="{% url 'generate_recipe' %}" class="btn btn-sm btn-info me-2">✨ AI Generator</a>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-sm btn-outline-light me-2">Login</a>
                <a href="{% url 'signup' %}" class="btn btn-sm btn-primary">Sign Up</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
