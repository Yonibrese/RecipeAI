{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Create an Account</h3>
                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {% if field.errors %}
                                <div class="text-danger small mb-1">{{ field.errors|striptags }}</div>
                            {% endif %}
                            <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" class="form-control" required id="{{ field.id_for_label }}">
                            {% if field.help_text %}
                                <div class="form-text small">{{ field.help_text|safe }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <button type="submit" class="btn btn-success w-100 mt-3">Sign Up</button>
                </form>
                <div class="text-center mt-3">
                    <small>Already have an account? <a href="{% url 'login' %}">Log in here</a>.</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
